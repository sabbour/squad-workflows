name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm test

      # On main: publishes with --tag latest (default changesets behavior)
      # Uses npm OIDC trusted publishing (no NPM_TOKEN needed).
      # setup-node writes .npmrc with ${NODE_AUTH_TOKEN} placeholder;
      # leaving it unset lets npm request an OIDC publish token automatically.
      - name: Remove auth placeholder from .npmrc
        run: sed -i '/:_authToken/d' "$NPM_CONFIG_USERCONFIG"
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/.npmrc

      - name: Create Release PR or Publish (npmjs)
        if: github.ref == 'refs/heads/main'
        id: changesets-stable
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"


      # Publish to GitHub Packages (mirror)
      - name: Setup GitHub Packages registry
        if: steps.changesets-stable.outputs.published == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      - name: Publish to GitHub Packages
        if: steps.changesets-stable.outputs.published == 'true'
        run: npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
