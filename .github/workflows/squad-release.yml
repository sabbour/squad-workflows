name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm test

      # Changesets: create version PR if changesets exist, or detect publish needed
      - name: Create Release PR or detect publish
        if: github.ref == 'refs/heads/main'
        id: changesets
        uses: changesets/action@v1
        with:
          publish: echo "publish-needed"
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to npmjs using OIDC trusted publishing (no token needed).
      # setup-node writes .npmrc with _authToken placeholder — strip it so
      # npm falls through to its native OIDC token exchange.
      - name: Publish to npmjs (OIDC trusted publishing)
        if: github.ref == 'refs/heads/main'
        id: publish-npm
        run: |
          # Strip any auth token from .npmrc so npm uses OIDC
          sed -i '/:_authToken/d' "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          # Check if current version is already published
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @sabbour/squad-workflows versions --json 2>/dev/null || echo "[]")
          if echo "$PUBLISHED" | grep -q "\"$LOCAL_VERSION\""; then
            echo "v$LOCAL_VERSION already published, skipping."
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing @sabbour/squad-workflows@$LOCAL_VERSION..."
            npm publish --provenance --access public
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi


      # Publish to GitHub Packages (mirror)
      - name: Setup GitHub Packages registry
        if: steps.publish-npm.outputs.published == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      - name: Publish to GitHub Packages
        if: steps.publish-npm.outputs.published == 'true'
        run: npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
